<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Token买手 — AI算力采购决策专家">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#0e1530"/>
      <stop offset="1" stop-color="#131a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.22" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- floating token chips -->
  <g opacity="0.16" filter="url(#soft)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="26" fill="#7dd3fc">
    <text x="940" y="120">1M tokens</text>
    <text x="1010" y="200">$0.28</text>
    <text x="900" y="285">cache hit</text>
    <text x="1050" y="360"> DeepSeek</text>
  </g>

  <!-- glass panel -->
  <rect x="80" y="150" width="760" height="340" rx="28" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="80" y="150" width="760" height="340" rx="28" fill="none" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="1.5"/>

  <text x="120" y="250" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="78" font-weight="800" fill="#f8fafc">Token<tspan fill="url(#accent)">买手</tspan></text>

  <text x="122" y="312" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="30" font-weight="600" fill="#cbd5e1">AI 算力采购决策专家</text>

  <text x="122" y="372" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="22" fill="#94a3b8">把「API 中转站」与「Token Plan」两类渠道</text>
  <text x="122" y="406" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="22" fill="#94a3b8">批量解析 · 交叉验证 · 反推真实折扣率 · 直接告诉你买谁</text>

  <!-- pill badges -->
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="20" font-weight="600">
    <rect x="122" y="438" width="170" height="40" rx="20" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="150" y="464" fill="#67e8f9">🔄 API 中转站</text>
    <rect x="312" y="438" width="170" height="40" rx="20" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="340" y="464" fill="#c4b5fd">📦 Token Plan</text>
  </g>

  <!-- bottom accent line -->
  <rect x="0" y="612" width="1280" height="28" fill="url(#accent)" opacity="0.9"/>
  <text x="80" y="632" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#0b1020" font-weight="700">WorkBuddy Skill · MIT License · v7.4</text>
</svg>
